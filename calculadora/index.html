<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="fondo">
    <div class="container">
        <h1 class="text-center text-light my-3">CALCULADORA</h1>
        <table border width="100%" class="table table-dark table-striped">
            <tr>
                <td colspan="2"><h3 class="text-light">NUMERO 1</h3></td>
            </tr>
            <tr>
                <td><input type="range" class="form-control" id="num1" min="1" max="100" value="1"></td>
                <td><h2 id="vnum1">1</h2></td>
            </tr>
            <tr>
                <td colspan="2"><h3 class="text-light">NUMERO 2</h3></td>
            </tr>
            <tr>
                <td><input type="range" class="form-control" id="num2" min="1" max="100" value="1"></td>
                <td><h2 id="vnum2">1</h2></td>
            </tr>
            <tr>
                <td><button onclick="suma()" class="btn btn-danger w-100">SUMA</button></td>
                <td><button onclick="resta()" class="btn btn-danger w-100">RESTA</button></td>
            </tr>
            <tr>
                <td><button onclick="multiplicacion()" class="btn btn-danger w-100">MULTIPLICACION</button></td>
                <td><button onclick="division()" class="btn btn-danger w-100">DIVISION</button></td>
            </tr>
            <tr>
                <td colspan="2"><button onclick="borrar()" class="btn btn-success w-100">BORRAR</button></td>
            </tr>
            <tr>
                <td colspan="2"><h2 class="text-center text-light" id="res">RESULTADO</h2></td>
            </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
